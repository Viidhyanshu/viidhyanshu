name: Generate Pacman Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Pacman Contribution Graph
        uses: Platane/snk@v3
        with:
          github_user_name: viidhyanshu
          outputs: |
            pacman-contribution-graph.svg
            pacman-contribution-graph-dark.svg?palette=github-dark

      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update pacman graph"
